<!DOCTYPE html>
<html lang="es">
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Cierre de Caja</title>
  <style>
    :root { --bg-color: #fbfbfd; --card-bg: #ffffff; --text-main: #1d1d1f; --blue-accent: #0071e3; }
    body { background-color: var(--bg-color); color: var(--text-main); font-family: -apple-system, sans-serif; padding: 20px; display: flex; justify-content: center; }
    .widget-container { background: var(--card-bg); width: 100%; max-width: 460px; border-radius: 18px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); padding: 24px; }
    .field { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #d2d2d7; }
    input { border: none; text-align: right; outline: none; font-size: 15px; }
    .submit-btn { width: 100%; background: var(--blue-accent); color: white; border: none; border-radius: 8px; padding: 12px; cursor: pointer; margin-top: 20px; }
  </style>
</head>
<body>

<div class="widget-container">
  <h1>Cierre de Caja</h1>
  <form id="formCaja" onsubmit="procesarCierre(event)">
    <div class="field"><label>Total caja</label><input type="number" id="totalCaja" required /></div>
    <div class="field"><label>Postnet</label><input type="number" id="ventasPostnet" required /></div>
    <div class="field"><label>Efectivo</label><input type="number" id="ventasEfectivo" required /></div>
    <button type="submit" class="submit-btn">Guardar y Enviar</button>
  </form>
</div>

<script>
  // 1. Inicialización
  const supabaseClient = supabase.createClient(
    'https://wbxwgboiwmabaskyeukj.supabase.co', 
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndieHdnYm9pd21hYmFza3lldWtqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3NTg4MzksImV4cCI6MjA5ODMzNDgzOX0.JFFD5Z3k8j0PManMCMyrj1HMmFzR56rCKT7RAK3ln0g'
  );

  async function procesarCierre(event) {
    event.preventDefault();
    
    // Obtener valores
    const total = document.getElementById('totalCaja').value;
    const postnet = document.getElementById('ventasPostnet').value;
    const efectivo = document.getElementById('ventasEfectivo').value;

    // 2. Guardar en Supabase
    const { error } = await supabaseClient
      .from('cierre_caja')
      .insert([{ monto: total, postnet: postnet, efectivo: efectivo }]);

    if (error) {
      alert("Error al guardar: " + error.message);
    } else {
      // 3. Redirigir a WhatsApp
      const mensaje = `Cierre: Total $${total}, Postnet $${postnet}, Efectivo $${efectivo}`;
      window.location.href = `https://api.whatsapp.com/send?phone=5491178276588&text=${encodeURIComponent(mensaje)}`;
    }
  }
</script>
</body>
</html>

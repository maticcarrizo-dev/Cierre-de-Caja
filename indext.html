<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Inicio - Control de Caja</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#fbfbfd" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  
  <style>
    :root {
      --bg: #fbfbfd;
      --card-bg: #ffffff;
      --text: #1d1d1f;
      --muted: #86868b;
      --accent: #0071e3;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      margin: 0;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 500px;
      margin-bottom: 40px;
    }

    header h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; }
    header p { color: var(--muted); font-size: 16px; margin-top: 5px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      width: 100%;
      max-width: 500px;
    }

    .app-card {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: var(--text);
      border: 1px solid rgba(0,0,0,0.05);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .app-card:active { transform: scale(0.95); }

    .icon-placeholder {
      width: 56px;
      height: 56px;
      background: #f2f2f7;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      font-size: 24px;
    }

    .app-card h2 { font-size: 14px; font-weight: 500; }
  </style>
</head>
<body>

<header>
  <h1>App Manager</h1>
  <p>Panel de control principal</p>
</header>

<div class="grid">
  <a href="cierre.html" class="app-card">
    <div class="icon-placeholder">💰</div>
    <h2>Cierre de Caja</h2>
  </a>
  
  <a href="#" class="app-card">
    <div class="icon-placeholder">📊</div>
    <h2>Reportes</h2>
  </a>

  <a href="#" class="app-card">
    <div class="icon-placeholder">📦</div>
    <h2>Inventario</h2>
  </a>

  <a href="#" class="app-card">
    <div class="icon-placeholder">⚙️</div>
    <h2>Ajustes</h2>
  </a>
</div>

<script>
  // Registro del service worker para que el menú también funcione offline
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>

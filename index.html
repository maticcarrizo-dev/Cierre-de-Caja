<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cierre de Caja</title>
  <style>
    @import url('https://googleapis.com');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2e3f;
      --accent: #4f8ef7;
      --accent-glow: rgba(79,142,247,0.15);
      --text: #e8eaf0;
      --muted: #7a7f9a;
      --success: #3ecf8e;
      --input-bg: #12151f;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 0 0 60px;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-icon {
      width: 38px;
      height: 38px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    header h1 {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    header span {
      font-size: 12px;
      color: var(--muted);
      display: block;
      margin-top: 1px;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .date-banner {
      background: var(--accent-glow);
      border: 1px solid rgba(79,142,247,0.3);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--accent);
      font-weight: 500;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
    }

    .card-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 14px;
    }

    .shift-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .shift-btn {
      background: var(--input-bg);
      border: 2px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 500;
      padding: 14px;
      cursor: pointer;
      transition: all 0.15s ease;
      text-align: center;
    }

    .shift-btn:hover { border-color: var(--accent); }
    .shift-btn.active {
      background: var(--accent-glow);
      border-color: var(--accent);
      color: var(--accent);
    }

    .field {
      margin-bottom: 14px;
    }

    .field:last-child { margin-bottom: 0; }

    label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 7px;
    }

    .input-wrap {
      position: relative;
    }

    .peso {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 15px;
      font-weight: 600;
      pointer-events: none;
    }

    input[type="number"] {
      width: 100%;
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 17px;
      font-weight: 600;
      padding: 13px 14px 13px 28px;
      outline: none;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

    input[type="number"]:focus {
      border-color: var(--accent);
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 4px 0 14px;
    }

    .send-btn {
      width: 100%;
      background: #25D366;
      border: none;
      border-radius: 14px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 600;
      padding: 17px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: opacity 0.15s, transform 0.1s;
      margin-top: 8px;
    }

    .send-btn:hover { opacity: 0.92; }
    .send-btn:active { transform: scale(0.98); }

    .send-btn svg {
      width: 20px;
      height: 20px;
      fill: #fff;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--success);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 12px 20px;
      border-radius: 30px;
      transition: transform 0.3s ease;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <div class="header-icon">🧾</div>
  <div>
    <h1>Cierre de Caja</h1>
    <span id="headerDate"></span>
  </div>
</header>

<div class="container">

  <!-- Fecha -->
  <div class="date-banner">
    📅 <span id="dateLabel"></span>
  </div>

  <!-- Turno -->
  <div class="card">
    <div class="card-title">Turno</div>
    <div class="shift-row">
      <button class="shift-btn" id="btnManana" onclick="selectTurno('Mañana')">🌅 Mañana</button>
      <button class="shift-btn" id="btnTarde" onclick="selectTurno('Tarde')">🌆 Tarde</button>
    </div>
  </div>

  <!-- Ventas -->
  <div class="card">
    <div class="card-title">Ventas del turno</div>

    <div class="field">
      <label>💰 Total en caja</label>
      <div class="input-wrap">
        <span class="peso">$</span>
        <input type="number" id="totalCaja" placeholder="0" inputmode="decimal" />
      </div>
    </div>

    <div class="field">
      <label>💳 Ventas por Postnet</label>
      <div class="input-wrap">
        <span class="peso">$</span>
        <input type="number" id="ventasPostnet" placeholder="0" inputmode="decimal" />
      </div>
    </div>

    <div class="field">
      <label>💵 Ventas en efectivo</label>
      <div class="input-wrap">
        <span class="peso">$</span>
        <input type="number" id="ventasEfectivo" placeholder="0" inputmode="decimal" />
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast">¡Datos listos!</div>

<script>
  // Inicialización de fechas automáticas
  const opciones = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  const fechaActual = new Date().toLocaleDateString('es-ES', opciones);
  document.getElementById('headerDate').innerText = fechaActual;
  document.getElementById('dateLabel').innerText = fechaActual;

  let turnoSeleccionado = '';

  function selectTurno(turno) {
    turnoSeleccionado = turno;
    document.getElementById('btnManana').classList.remove('active');
    document.getElementById('btnTarde').classList.remove('active');
    
    if(turno === 'Mañana') {
      document.getElementById('btnManana').classList.add('active');
    } else {
      document.getElementById('btnTarde').classList.add('active');
    }
  }
</script>

</body>
</html>

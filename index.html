<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cierre de Caja</title>
  <style>
    @import url('https://googleapis.com');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2e3f;
      --accent: #4f8ef7;
      --accent-glow: rgba(79,142,247,0.15);
      --text: #e8eaf0;
      --muted: #7a7f9a;
      --success: #3ecf8e;
      --input-bg: #12151f;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 0 0 60px;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-icon {
      width: 38px;
      height: 38px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    header h1 {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }
    header span {
      font-size: 12px;
      color: var(--muted);
      display: block;
      margin-top: 1px;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .date-banner {
      background: var(--accent-glow);
      border: 1px solid rgba(79,142,247,0.3);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--accent);
      font-weight: 500;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
    }
    .card-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 14px;
    }
    .shift-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .shift-btn {
      background: var(--input-bg);
      border: 2px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 500;
      padding: 14px;
      cursor: pointer;
      transition: all 0.15s ease;
      text-align: center;
    }
    .shift-btn:hover { border-color: var(--accent); }
    .shift-btn.active {
      background: var(--accent-glow);
      border-color: var(--accent);
      color: var(--accent);
    }
    .field {
      margin-bottom: 14px;
    }
    .field:last-child { margin-bottom: 0; }
    label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 7px;
    }
    .input-wrap {
      position: relative;
    }
    .peso {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 15px;
      font-weight: 600;
      pointer-events: none;
    }
    input[type="number"] {
      width: 100%;
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 17px;
      font-weight: 600;
      padding: 13px 14px 13px 28px;
      outline: none;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    input[type="number"]:focus {
      border-color: var(--accent);
    }
    .send-btn {
      width: 100%;
      background: #25D366;
      border: none;
      border-radius: 14px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 600;
      padding: 17px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: opacity 0.15s, transform 0.1s;
      margin-top: 8px;
    }
    .send-btn:hover { opacity: 0.92; }
    .send-btn:active { transform: scale(0.98); }
    .send-btn svg {
      width: 20px;
      height: 20px;
      fill: #fff;
    }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--success);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 12px 20px;
      border-radius: 30px;
      transition: transform 0.3s ease;
      white-space: nowrap;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<header>
  <div class="header-icon">🧾</div>
  <div>
    <h1>Cierre de Caja</h1>
    <span id="headerDate">--/--/----</span>
  </div>
</header>
<div class="container">
  <div class="date-banner">
    📅 <span id="dateLabel">Cargando fecha...</span>
  </div>
  <div class="card">
    <div class="card-title">Turno</div>
    <div class="shift-row">
      <button class="shift-btn" id="btnManana" onclick="selectTurno('Mañana')">🌅 Mañana</button>
      <button class="shift-btn" id="btnTarde" onclick="selectTurno('Tarde')">🌆 Tarde</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Ventas del turno</div>
    <div class="field">
      <label>💰 Total en caja</label>
      <div class="input-wrap">
        <span class="peso">$</span>
        <input type="number" id="totalCaja" placeholder="0" inputmode="decimal" />
      </div>
    </div>
    <div class="field">
      <label>💳 Ventas por Postnet</label>
      <div class="input-wrap">
        <span class="peso">$</span>
        <input type="number" id="ventasPostnet" placeholder="0" inputmode="decimal" />
      </div>
    </div>
    <div class="field">
      <label>💵 Ventas en efectivo</label>
      <div class="input-wrap">
        <span class="peso">$</span>
        <input type="number" id="ventasEfectivo" placeholder="0" inputmode="decimal" />
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Cierre</div>
    <div class="field">
      <label>🏧 Caja a retirar</label>
      <div class="input-wrap">
        <span class="peso">$</span>
        <input type="number" id="cajaRetirar" placeholder="0" inputmode="decimal" />
      </div>
    </div>
    <div class="field">
      <label>🔄 Cambio para el turno siguiente</label>
      <div class="input-wrap">
        <span class="peso">$</span>
        <input type="number" id="cambioSiguiente" placeholder="0" inputmode="decimal" />
      </div>
    </div>
  </div>
  
  <!-- ALTERNATIVA DEFINITIVA: Enlace nativo con estilo de botón -->
  <a id="btnWhatsApp" href="#" class="send-btn" style="text-decoration: none;" onclick="prepararMensaje(event)">
    <svg viewBox="0 0 24 24" xmlns="http://w3.org">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>
    Enviar por WhatsApp
  </a>
</div>
<div class="toast" id="toast">✓ Generando enlace...</div>
<script>
  let turnoSeleccionado = '';
  let fechaCorta = '';
  try {
    const now = new Date();
    fechaCorta = now.toLocaleDateString('es-AR');
    const opciones = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    let fechaLarga = now.toLocaleDateString('es-AR', opciones);
    if (fechaLarga && fechaLarga.length > 0) {
      fechaLarga = fechaLarga.charAt(0).toUpperCase() + fechaLarga.slice(1);
    }
    document.getElementById('dateLabel').textContent = fechaLarga || fechaCorta;
    document.getElementById('headerDate').textContent = fechaCorta;
  } catch (e) {
    const d = new Date();
    fechaCorta = d.getDate() + '/' + (d.getMonth() + 1) + '/' + d.getFullYear();
    document.getElementById('dateLabel').textContent = "Cierre de Caja Diario";
    document.getElementById('headerDate').textContent = fechaCorta;
  }
  function selectTurno(turno) {
    turnoSeleccionado = turno;
    document.getElementById('btnManana').classList.toggle('active', turno === 'Mañana');
    document.getElementById('btnTarde').classList.toggle('active', turno === 'Tarde');
  }
  function fmt(val) {
    const n = parseFloat(val) || 0;
    return '$' + n.toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  
  // LOGICA MEJORADA: El script solo inyecta el texto en el enlace antes de que actúe el clic
  function prepararMensaje(event) {
    if (!turnoSeleccionado) {
      event.preventDefault(); // Detiene el enlace
      alert('Por favor seleccioná el turno antes de enviar.');
      return;
    }
    const totalCaja     = document.getElementById('totalCaja').value;
    const ventasPostnet = document.getElementById('ventasPostnet').value;
    const ventasEfectivo= document.getElementById('ventasEfectivo').value;
    const cajaRetirar   = document.getElementById('cajaRetirar').value;
    const cambioSig     = document.getElementById('cambioSiguiente').value;
    const mensaje =
`🧾 *CIERRE DE CAJA*
📅 Fecha: ${fechaCorta}
🕐 Turno: ${turnoSeleccionado}

💰 Total en caja: ${fmt(totalCaja)}
💳 Ventas Postnet: ${fmt(ventasPostnet)}
💵 Ventas efectivo: ${fmt(ventasEfectivo)}

🏧 Caja retirada: ${fmt(cajaRetirar)}
🔄 Cambio turno siguiente: ${fmt(cambioSig)}`;
    
    const numero = '5491178276588';
    
    // Usamos el link oficial universal para máxima compatibilidad móvil/PC
    const url = `https://wa.me{numero}?text=${encodeURIComponent(mensaje)}`;
    
    // Asignamos la dirección final directamente al enlace antes de que termine el clic
    document.getElementById('btnWhatsApp').href = url;
    
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Bienvenido</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --icon-placeholder: #e5e5ea;
      --text: #1d1d1f;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 80px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 600px;
    }

    h1 {
      font-size: 48px;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-bottom: 60px;
    }

    .grid {
      display: grid;
      /* Ajuste dinámico para que se vea bien en móvil y escritorio */
      grid-template-columns: repeat(2, 1fr);
      gap: 40px;
    }

    .app-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: var(--text);
      transition: opacity 0.2s ease;
    }

    .app-box:hover { opacity: 0.7; }
    .app-box:active { transform: scale(0.95); }

    /* Placeholder circular minimalista */
    .icon-placeholder {
      width: 120px;
      height: 120px;
      background-color: var(--icon-placeholder);
      border-radius: 28px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .label {
      font-size: 14px;
      font-weight: 400;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Bienvenido.</h1>

  <div class="grid">
    <a href="cierre.html" class="app-box">
      <div class="icon-placeholder"></div>
      <span class="label">Cierre</span>
    </a>

    <a href="#" class="app-box">
      <div class="icon-placeholder"></div>
      <span class="label">Pedidos</span>
    </a>

    <a href="#" class="app-box">
      <div class="icon-placeholder"></div>
      <span class="label">Reportes</span>
    </a>

    <a href="#" class="app-box">
      <div class="icon-placeholder"></div>
      <span class="label">Ajustes</span>
    </a>
  </div>
</div>

</body>
</html>

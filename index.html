<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Control de Caja</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  
  <style>
    :root {
      --bg: #f2f2f7; /* Gris característico de iOS */
      --text-main: #1d1d1f;
      --text-muted: #86868b;
      --card-bg: rgba(255, 255, 255, 0.8); /* Efecto vidrio sutil */
    }

    body {
      background-color: var(--bg);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      margin: 0;
      padding: 60px 20px 20px;
    }

    .welcome-header {
      margin-bottom: 32px;
      padding: 0 10px;
    }

    .welcome-header h1 {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .app-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      height: 140px;
      text-decoration: none;
      color: var(--text-main);
      border: 0.5px solid rgba(0,0,0,0.05);
      transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .app-card:active { transform: scale(0.96); }

    .icon-box {
      width: 40px;
      height: 40px;
      margin-bottom: 12px;
      /* Aquí puedes poner tus iconos PNG en el futuro */
      background: #e5e5ea;
      border-radius: 12px;
    }

    .app-card h2 {
      font-size: 15px;
      font-weight: 600;
      margin: 0;
    }
  </style>
</head>
<body>

<header class="welcome-header">
  <h1>Bienvenido!</h1>
</header>

<div class="grid">
  <a href="cierre.html" class="app-card">
    <div class="icon-box"></div>
    <h2>Cierre de Caja</h2>
  </a>
  
  <a href="#" class="app-card">
  <img src="cierre_de_caja.png" alt="Cierre de Caja" style="width: 100%; height: 100%; border-radius: 12px;">
    <h2>Reportes</h2>
  </a>
</div>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>

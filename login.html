<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Acceso</title>

<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="apple-touch-icon" sizes="167x167" href="icon-167.png">
<link rel="apple-touch-icon" sizes="152x152" href="icon-152.png">
<link rel="apple-touch-icon" sizes="120x120" href="icon-120.png">
<link rel="icon" href="icon-32.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kiosco">
<meta name="theme-color" content="#f2f2f7">
<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#f2f2f7;
    --card:#ffffff;
    --text:#1d1d1f;
    --text-secondary:#8e8e93;
    --field-bg:rgba(118,118,128,0.12);
    --separator:rgba(60,60,67,0.29);
    --blue:#007aff;
    --blue-press:#0062cc;
    --red:#ff3b30;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html,body{
    margin:0;
    height:100%;
    background:var(--bg);
    font-family:-apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
    color:var(--text);
  }

  body{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
  }

  .card{
    background:var(--card);
    width:100%;
    max-width:340px;
    border-radius:20px;
    padding:36px 28px 28px;
    box-shadow:0 20px 45px rgba(0,0,0,0.08);
    text-align:center;
  }

  .avatar{
    width:64px;
    height:64px;
    border-radius:50%;
    background:linear-gradient(160deg, #0a84ff, #005ecb);
    margin:0 auto 18px;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 4px 12px rgba(0,122,255,0.28);
  }

  .avatar svg{ width:28px; height:28px; }

  h1{
    font-size:20px;
    font-weight:600;
    letter-spacing:-0.2px;
    margin:0 0 4px;
  }

  .subtitle{
    font-size:14px;
    color:var(--text-secondary);
    margin:0 0 24px;
    line-height:1.4;
  }

  form{
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .field{
    display:flex;
    align-items:center;
    gap:10px;
    background:var(--field-bg);
    border-radius:11px;
    padding:0 12px;
    height:46px;
    border:1.5px solid transparent;
    transition:border-color 0.15s ease, background 0.15s ease;
  }

  .field:focus-within{
    border-color:var(--blue);
    background:#ffffff;
  }

  .field svg{
    width:17px;
    height:17px;
    flex-shrink:0;
    opacity:0.55;
  }

  .field input{
    flex:1;
    min-width:0;
    border:none;
    background:transparent;
    outline:none;
    font-family:inherit;
    font-size:15px;
    color:var(--text);
    padding:0;
    height:100%;
  }

  .field input::placeholder{ color:#a1a1a6; }

  .toggle-visibility{
    background:none;
    border:none;
    padding:4px;
    cursor:pointer;
    display:flex;
    opacity:0.5;
    transition:opacity 0.15s ease;
  }

  .toggle-visibility:hover{ opacity:0.85; }
  .toggle-visibility svg{ width:18px; height:18px; }

  .error-text{
    font-size:13px;
    color:var(--red);
    text-align:left;
    padding:0 4px;
    min-height:16px;
    margin-top:-2px;
  }

  .submit-btn{
    margin-top:8px;
    width:100%;
    background:var(--blue);
    border:none;
    border-radius:11px;
    color:#ffffff;
    font-family:inherit;
    font-size:16px;
    font-weight:590;
    padding:13px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    transition:background 0.12s ease, transform 0.12s ease, opacity 0.15s ease;
  }

  .submit-btn:active{
    background:var(--blue-press);
    transform:scale(0.985);
  }

  .submit-btn:disabled{
    opacity:0.45;
    cursor:default;
  }

  .spinner{
    width:16px;
    height:16px;
    border-radius:50%;
    border:2px solid rgba(255,255,255,0.4);
    border-top-color:#fff;
    animation:spin 0.7s linear infinite;
    display:none;
  }

  .submit-btn.loading .spinner{ display:block; }
  .submit-btn.loading .btn-label{ display:none; }

  @keyframes spin{ to{ transform:rotate(360deg); } }

  .footnote{
    margin-top:20px;
    font-size:12px;
    color:var(--text-secondary);
  }

  .toast{
    position:fixed;
    top:16px;
    left:50%;
    transform:translateX(-50%) translateY(-120px);
    max-width:calc(100% - 32px);
    background:rgba(29,29,31,0.92);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    color:#fff;
    font-size:14px;
    font-weight:500;
    padding:12px 18px;
    border-radius:14px;
    display:flex;
    align-items:center;
    gap:8px;
    transition:transform 0.45s cubic-bezier(0.175,0.885,0.32,1.275);
    z-index:100;
    box-shadow:0 8px 24px rgba(0,0,0,0.2);
  }

  .toast.show{ transform:translateX(-50%) translateY(0); }
  .toast .dot{ width:8px; height:8px; border-radius:50%; background:var(--red); flex-shrink:0; }
</style>
</head>
<body>

<div class="card">
  <div class="avatar">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="10" rx="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>

  <h1>Iniciar sesión</h1>
  <p class="subtitle">Ingresá tus datos para acceder al panel del kiosco.</p>

  <form id="loginForm" onsubmit="return login(event)">
    <div class="field">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 6 10-6"/></svg>
      <input type="email" id="email" placeholder="Correo" autocomplete="username" required>
    </div>

    <div class="field">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <input type="password" id="password" placeholder="Contraseña" autocomplete="current-password" required>
      <button type="button" class="toggle-visibility" onclick="togglePassword()" aria-label="Mostrar contraseña">
        <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>

    <div class="error-text" id="errorText"></div>

    <button type="submit" class="submit-btn" id="submitBtn">
      <span class="spinner"></span>
      <span class="btn-label">Entrar</span>
    </button>
  </form>

  <div class="footnote">Acceso interno · Maxikiosco</div>
</div>

<div class="toast" id="toast"><span class="dot"></span><span id="toastMsg"></span></div>

<script>
  const supabaseClient = supabase.createClient(
    'https://wbxwgboiwmabaskyeukj.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndieHdnYm9pd21hYmFza3lldWtqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3NTg4MzksImV4cCI6MjA5ODMzNDgzOX0.JFFD5Z3k8j0PManMCMyrj1HMmFzR56rCKT7RAK3ln0g'
  );

  function togglePassword() {
    const input = document.getElementById('password');
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    document.getElementById('eyeIcon').innerHTML = isHidden
      ? '<path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a21.6 21.6 0 0 1 5.06-5.94M9.9 4.24A10.4 10.4 0 0 1 12 4c7 0 11 7 11 7a21.6 21.6 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/>';
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3200);
  }

  async function login(event) {
    event.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('submitBtn');
    const errorText = document.getElementById('errorText');
    errorText.textContent = '';

    btn.disabled = true;
    btn.classList.add('loading');

    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

    btn.disabled = false;
    btn.classList.remove('loading');

    if (error) {
      errorText.textContent = 'Correo o contraseña incorrectos.';
      showToast('No se pudo iniciar sesión');
      return false;
    }

    window.location.href = 'index.html';
    return false;
  }
</script>
</body>
</html>

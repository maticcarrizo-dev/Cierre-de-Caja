<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Acceso</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* Usamos la misma estética minimalista */
    body { font-family: -apple-system, sans-serif; background: #f5f5f7; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 300px; }
    input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #d2d2d7; border-radius: 12px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #0071e3; color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>

<div class="card">
  <h2>Iniciar sesión</h2>
  <input type="email" id="email" placeholder="Correo">
  <input type="password" id="password" placeholder="Contraseña">
  <button onclick="login()">Entrar</button>
</div>

<script>
  // 1. Busca estos valores en tu panel de Supabase: Project Settings > API
  const supabase = supabase.createClient('TU_URL', 'TU_ANON_KEY');

  async function login() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    const { data, error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
      alert("Error: " + error.message);
    } else {
      // Si el login es exitoso, redirigimos al menú (index.html)
      window.location.href = 'index.html';
    }
  }
</script>
</body>
</html>
